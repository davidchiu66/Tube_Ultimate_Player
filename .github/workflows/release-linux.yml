name: Build Linux AppImage and DEB

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build-linux-x86_64:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            curl unzip xz-utils binutils patchelf desktop-file-utils libfuse2 \
            ffmpeg libmpv-dev mpv xvfb xauth \
            libx11-xcb1 libxcb1 libxcb-cursor0 libxcb-icccm4 libxcb-image0 \
            libxcb-keysyms1 libxcb-randr0 libxcb-render-util0 libxcb-shape0 \
            libxcb-shm0 libxcb-sync1 libxcb-xfixes0 libxcb-xinerama0 libxcb-xkb1 \
            libxkbcommon-x11-0 libgl1 libegl1 \
            libfontconfig1 libdbus-1-3

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare bundled libmpv, Deno, FFmpeg and yt-dlp
        run: bash packaging/linux/prepare_runtime.sh

      - name: Run unit tests
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest discover -s tests -v

      - name: Run X11 libmpv smoke test
        run: >-
          xvfb-run -a -s "-screen 0 1280x720x24"
          env QT_QPA_PLATFORM=xcb QT_DEBUG_PLUGINS=1 LIBGL_ALWAYS_SOFTWARE=1
          python tests/linux_mpv_smoke.py

      - name: Stage enhanced AppDir
        run: python build_linux.py

      - name: Download AppImage tooling
        run: |
          curl -fL --retry 5 \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage \
            -o "${RUNNER_TEMP}/linuxdeploy"
          curl -fL --retry 5 \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage \
            -o "${RUNNER_TEMP}/appimagetool"
          chmod +x "${RUNNER_TEMP}/linuxdeploy" "${RUNNER_TEMP}/appimagetool"

      - name: Collect libmpv dependency closure
        run: |
          LIBMPV_PATH="$(find 3rdpart -maxdepth 1 -type f -name 'libmpv.so*' -print -quit)"
          if [ -z "$LIBMPV_PATH" ]; then
            echo "Bundled libmpv was not found" >&2
            exit 1
          fi
          "${RUNNER_TEMP}/linuxdeploy" --appimage-extract-and-run \
            --appdir build/linux/AppDir \
            --executable build/linux/AppDir/usr/bin/Tube_Ultimate_Player \
            --library "$LIBMPV_PATH"
          cp packaging/linux/AppRun build/linux/AppDir/AppRun
          chmod +x build/linux/AppDir/AppRun
          (
            cd build/linux/AppDir
            find usr/lib usr/bin/3rdpart -type f -print0 \
              | sort -z \
              | xargs -0 sha256sum
          ) > build/linux/AppDir/usr/bin/bundled-runtime-manifest.sha256

      - name: Build AppImage and DEB
        run: |
          VERSION="$(tr -d '\r\n' < app_version.txt)"
          mkdir -p dist/linux
          ARCH=x86_64 "${RUNNER_TEMP}/appimagetool" --appimage-extract-and-run \
            build/linux/AppDir \
            "dist/linux/Tube_Ultimate_Player_v${VERSION}_x86_64_with_deno_ffmpeg.AppImage"
          python build_linux.py --reuse-appdir --build-deb
          chmod +x "dist/linux/Tube_Ultimate_Player_v${VERSION}_x86_64_with_deno_ffmpeg.AppImage"
          sha256sum dist/linux/* > dist/linux/SHA256SUMS

      - name: Verify package contents
        run: |
          test -x build/linux/AppDir/usr/bin/Tube_Ultimate_Player
          test -x build/linux/AppDir/usr/bin/3rdpart/deno
          test -x build/linux/AppDir/usr/bin/3rdpart/ffmpeg
          test -x build/linux/AppDir/usr/bin/3rdpart/ffprobe
          test -x build/linux/AppDir/usr/bin/3rdpart/yt-dlp_linux
          find build/linux/AppDir/usr/bin/3rdpart -maxdepth 1 -name 'libmpv.so*' | grep -q .
          test -f build/linux/AppDir/usr/bin/THIRD_PARTY_BUNDLED.md
          test -f build/linux/AppDir/usr/bin/third-party-manifest.sha256
          test -f build/linux/AppDir/usr/bin/bundled-runtime-manifest.sha256
          desktop-file-validate build/linux/AppDir/usr/share/applications/tube-ultimate-player.desktop
          dpkg-deb --info dist/linux/*.deb

      - name: Upload Linux packages
        uses: actions/upload-artifact@v4
        with:
          name: Tube_Ultimate_Player_linux_x86_64_with_deno_ffmpeg
          path: dist/linux/*
          if-no-files-found: error
