name: Release Portable

on:
  workflow_dispatch:

jobs:
  build-portable:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Validate formal version
        shell: powershell
        run: |
          $version = (Get-Content app_version.txt -Raw).Trim()
          if ($version -match "-") { throw "Formal release versions must not contain prerelease suffixes: $version" }

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller requests

      - name: Download latest yt-dlp
        shell: powershell
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/yt-dlp/yt-dlp/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -eq "yt-dlp.exe" } | Select-Object -First 1
          if (-not $asset) { throw "yt-dlp.exe asset not found" }
          New-Item -ItemType Directory -Force -Path "3rdpart" | Out-Null
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "3rdpart/yt-dlp.exe"

      - name: Download libmpv from SourceForge
        shell: powershell
        run: |
          $url = "https://downloads.sourceforge.net/project/mpv-player-windows/libmpv/mpv-dev-x86_64-v3-20260607-git-71ebd08.7z"
          $archive = Join-Path $env:RUNNER_TEMP "mpv-dev-x86_64-v3-20260607-git-71ebd08.7z"
          $extractDir = Join-Path $env:RUNNER_TEMP "mpv-dev"
          & curl.exe -L --fail --retry 5 --retry-delay 5 --connect-timeout 30 --output $archive $url
          if ($LASTEXITCODE -ne 0) { throw "Failed to download libmpv archive" }
          $archiveSize = (Get-Item $archive).Length
          Write-Host "libmpv archive size: $archiveSize bytes"
          if ($archiveSize -lt 10485760) { throw "Downloaded libmpv archive is unexpectedly small: $archiveSize bytes" }

          $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          if (-not $sevenZip) { $sevenZip = Join-Path $env:ProgramFiles "7-Zip\7z.exe" }
          if (-not (Test-Path $sevenZip)) {
            choco install 7zip -y --no-progress
            $sevenZip = (Get-Command 7z.exe -ErrorAction SilentlyContinue).Source
          }
          if (-not $sevenZip -or -not (Test-Path $sevenZip)) { throw "7-Zip was not found" }

          if (Test-Path $extractDir) { Remove-Item -LiteralPath $extractDir -Recurse -Force }
          New-Item -ItemType Directory -Force -Path $extractDir | Out-Null
          & $sevenZip x $archive "-o$extractDir" -y
          if ($LASTEXITCODE -ne 0) { throw "Failed to extract libmpv archive" }

          $dll = Get-ChildItem -Path $extractDir -Recurse -Filter "libmpv-2.dll" |
            Sort-Object Length -Descending |
            Select-Object -First 1
          if (-not $dll) { throw "libmpv-2.dll was not found in the SourceForge archive" }
          New-Item -ItemType Directory -Force -Path "3rdpart" | Out-Null
          Copy-Item -LiteralPath $dll.FullName -Destination "3rdpart/libmpv-2.dll" -Force

      - name: Verify libmpv payload
        shell: powershell
        run: |
          foreach ($name in @("libmpv-2.dll", "libEGL.dll", "libGLESv2.dll")) {
            $path = Join-Path "3rdpart" $name
            if (-not (Test-Path $path)) { throw "Missing $path" }
            $size = (Get-Item $path).Length
            Write-Host "$name size: $size bytes"
            if ($name -eq "libmpv-2.dll" -and $size -lt 10485760) {
              throw "libmpv-2.dll is unexpectedly small ($size bytes)."
            }
          }

      - name: Build portable package
        run: python build_portable.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tube_Ultimate_Player_portable
          path: dist/*.zip
