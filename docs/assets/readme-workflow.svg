  <text x="100" y="226" fill="#60A5FA" font-size="18" font-family="Segoe UI, Arial, sans-serif">STEP 1</text>
  <text x="100" y="266" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">搜索或首页浏览</text>
  <text x="100" y="312" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">关键词搜索</text>
