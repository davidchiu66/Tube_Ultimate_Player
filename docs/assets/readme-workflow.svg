<svg width="1280" height="520" viewBox="0 0 1280 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1280" height="520" rx="28" fill="#0F172A"/>
  <text x="64" y="82" fill="#F8FAFC" font-size="42" font-family="Segoe UI, Arial, sans-serif" font-weight="700">
    使用流程
  </text>
  <text x="64" y="122" fill="#94A3B8" font-size="22" font-family="Segoe UI, Arial, sans-serif">
    从搜索到播放，再到下载与回看
  </text>

  <rect x="64" y="178" width="218" height="222" rx="24" fill="#111827" stroke="#23314D"/>
  <rect x="318" y="178" width="218" height="222" rx="24" fill="#111827" stroke="#23314D"/>
  <rect x="572" y="178" width="218" height="222" rx="24" fill="#111827" stroke="#23314D"/>
