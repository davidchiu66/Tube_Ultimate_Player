  <text x="100" y="368" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">九宫格选中</text>

  <text x="354" y="226" fill="#60A5FA" font-size="18" font-family="Segoe UI, Arial, sans-serif">STEP 2</text>
  <text x="354" y="266" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">解析并播放</text>
  <text x="354" y="312" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">URL 解析</text>
  <text x="354" y="340" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">mpv 播放控制</text>
  <text x="354" y="368" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">字幕 / 清晰度 / 全屏</text>

  <text x="608" y="226" fill="#60A5FA" font-size="18" font-family="Segoe UI, Arial, sans-serif">STEP 3</text>
  <text x="608" y="266" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">收藏与历史</text>
  <text x="608" y="312" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">一键收藏视频</text>
  <text x="608" y="340" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">自动记录播放历史</text>
  <text x="608" y="368" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">重启后继续保留</text>

  <text x="862" y="226" fill="#60A5FA" font-size="18" font-family="Segoe UI, Arial, sans-serif">STEP 4</text>
  <text x="862" y="266" fill="#F8FAFC" font-size="28" font-family="Segoe UI, Arial, sans-serif" font-weight="700">下载队列</text>
