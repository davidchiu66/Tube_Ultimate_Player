  <text x="862" y="340" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">暂停 / 启动 / 删除</text>
  <text x="862" y="368" fill="#94A3B8" font-size="19" font-family="Segoe UI, Arial, sans-serif">完成后本地回看</text>

