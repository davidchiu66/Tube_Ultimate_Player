      <stop offset="0.36" stop-color="#101a66"/>
      <stop offset="0.72" stop-color="#071125"/>
      <stop offset="1" stop-color="#030712"/>
    </radialGradient>
    <linearGradient id="edge" x1="154" y1="128" x2="870" y2="896" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6ffbff"/>
      <stop offset="0.42" stop-color="#2f80ff"/>
      <stop offset="0.72" stop-color="#9f5cff"/>
      <stop offset="1" stop-color="#ff3df2"/>
